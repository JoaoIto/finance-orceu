version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: orceu-finance-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-orceu_finance}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d orceu_finance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
